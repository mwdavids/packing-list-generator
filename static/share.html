<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shared Packing List</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23c4875b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='2,20 7,12 10,15 15,5 20,13 22,20'/></svg>">
<style>
:root {
  --bg: #1c1c1c; --surface: #272727; --surface2: #333333;
  --accent: #c4875b; --text: #e8e4df; --text-muted: #9a958e;
  --border: #3d3937; --success: #7daa6e; --radius: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.container { max-width: 900px; margin: 0 auto; padding: 20px; }
header { text-align: center; padding: 24px 0 16px; }
header h1 { font-size: 1.4rem; font-weight: 600; }
header .meta { color: var(--text-muted); font-size: 0.85rem; margin-top: 6px; }
#content {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; min-height: 200px; font-size: 0.9rem; line-height: 1.6; margin-top: 16px;
}
#content h1, #content h2, #content h3 { margin: 1.2em 0 0.4em; font-size: 1rem; color: var(--accent); }
#content h1:first-child, #content h2:first-child { margin-top: 0; }
#content table { width: 100%; border-collapse: collapse; margin: 0.5em 0 1.2em; font-size: 0.85rem; }
#content th, #content td { text-align: left; padding: 6px 10px; border: 1px solid var(--border); }
#content th { background: var(--surface2); color: var(--text-muted); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.03em; }
#content tr:nth-child(even) { background: rgba(255,255,255,0.02); }
#content hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }
#content ol, #content ul { padding-left: 1.4em; margin: 0.4em 0; }
#content p { margin: 0.4em 0; }
#content strong { color: var(--text); }
.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px;
  border: none; border-radius: var(--radius); font-size: 0.85rem; cursor: pointer;
  transition: all 0.2s; font-family: inherit;
  background: var(--surface2); color: var(--text); border: 1px solid var(--border);
}
.btn:hover { border-color: var(--accent); }
.btn-group { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
.footer { text-align: center; margin-top: 32px; padding: 16px 0; border-top: 1px solid var(--border); }
.footer a { color: var(--accent); text-decoration: none; font-size: 0.9rem; }
.footer a:hover { text-decoration: underline; }
.error { text-align: center; padding: 40px; color: var(--text-muted); }
.toast {
  position: fixed; bottom: 24px; right: 24px; background: var(--success);
  color: #111; padding: 10px 20px; border-radius: var(--radius);
  font-size: 0.9rem; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100;
}
.toast.show { opacity: 1; }
</style>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<div class="container">
  <header>
    <h1 id="title">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px;margin-right:4px;"><polyline points="2,20 7,12 10,15 15,5 20,13 22,20"/></svg>
      <span id="title-text">Loading…</span>
    </h1>
    <div class="meta" id="meta"></div>
  </header>
  <div id="content"></div>
  <div class="btn-group" id="actions" style="display:none;">
    <button class="btn" id="copy-text-btn">Copy text</button>
    <button class="btn" id="copy-csv-btn">Copy as CSV (for Sheets)</button>
  </div>
  <div class="footer">
    <a href="/">Create your own packing list &rarr;</a>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
let sharedMarkdown = '';

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2200);
}

const token = window.location.pathname.split('/').pop();
fetch('/api/share/' + encodeURIComponent(token))
  .then(r => { if (!r.ok) throw new Error('Not found'); return r.json(); })
  .then(data => {
    sharedMarkdown = data.markdown;
    document.getElementById('title-text').textContent = data.title || 'Shared Packing List';
    document.title = data.title || 'Shared Packing List';
    const parts = [data.trip_type, data.location, data.season, data.duration].filter(Boolean);
    if (data.created_at) parts.push(new Date(data.created_at + 'Z').toLocaleDateString());
    document.getElementById('meta').textContent = parts.join(' \u00b7 ');
    document.getElementById('content').innerHTML = marked.parse(data.markdown);
    document.getElementById('actions').style.display = 'flex';
  })
  .catch(() => {
    document.getElementById('title-text').textContent = 'Not Found';
    document.getElementById('content').innerHTML = '<div class="error">This shared list was not found or has been removed.</div>';
  });

document.getElementById('copy-text-btn').onclick = () => {
  navigator.clipboard.writeText(sharedMarkdown).then(() => toast('Copied to clipboard'));
};

document.getElementById('copy-csv-btn').onclick = () => {
  const tsv = parseToTSV(sharedMarkdown);
  navigator.clipboard.writeText(tsv).then(() => toast('Copied as TSV \u2014 paste into Google Sheets'));
};

function parseToTSV(text) {
  const lines = text.split('\n');
  let category = '';
  const rows = ['Category\tItem\tEssential\tNote'];
  let colMap = null;
  for (const raw of lines) {
    const line = raw.trim();
    if (!line) continue;
    const hm = line.match(/^#{1,3}\s+(.+)/) || line.match(/^\*\*(.+?)\*\*\s*$/);
    if (hm) {
      const h = hm[1].trim();
      if (/key\s+considerations/i.test(h)) { category = ''; colMap = null; continue; }
      category = h; colMap = null; continue;
    }
    if (!category) continue;
    if (/^\|[\s\-:]+\|/.test(line)) continue;
    if (/^\|.*\bItem\b.*\|/i.test(line)) {
      const cols = line.split('|').map(c => c.trim().toLowerCase()).filter(Boolean);
      colMap = { item: -1, priority: -1, notes: -1 };
      cols.forEach((c, i) => {
        if (/^item/.test(c)) colMap.item = i;
        else if (/priority|essential/.test(c)) colMap.priority = i;
        else if (/note/.test(c)) colMap.notes = i;
      });
      continue;
    }
    if (line.startsWith('|') && line.endsWith('|')) {
      const cells = line.split('|').slice(1, -1).map(c => c.trim());
      if (cells.length < 2) continue;
      let item = '', essential = '', note = '';
      if (colMap && colMap.item >= 0) {
        item = cells[colMap.item] || '';
        const prio = colMap.priority >= 0 ? (cells[colMap.priority] || '') : '';
        note = colMap.notes >= 0 ? (cells[colMap.notes] || '') : '';
        essential = /optional/i.test(prio) ? 'Optional' : 'Yes';
      } else { item = cells[0]; note = cells.length > 2 ? cells[cells.length - 1] : ''; essential = 'Yes'; }
      item = item.replace(/\*\*/g, '').replace(/[*_]/g, '').trim();
      note = note.replace(/[*_]/g, '').trim();
      if (item && item !== '-') rows.push([category, item, essential, note].join('\t'));
      continue;
    }
    const im = line.match(/^[-*\d.)\s]+(.+)/);
    if (!im) continue;
    let it = im[1].trim(), ess = '';
    if (/\bOPTIONAL\b/i.test(it)) { ess = 'Optional'; it = it.replace(/\bOPTIONAL\b/gi, ''); } else { ess = 'Yes'; }
    it = it.replace(/\*\*/g, '').replace(/[*_]/g, '').trim();
    if (it) rows.push([category, it, ess, ''].join('\t'));
  }
  return rows.join('\n');
}
</script>
</body>
</html>
