app = "packing-list-generator"
primary_region = "sjc"

[build]

[env]
  PORT = "8000"
  LISTS_FILE = "/data/lists.json"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[mounts]
  source = "lists_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
